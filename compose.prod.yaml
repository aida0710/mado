# compose.prod.yaml
# project name と container_name を mado-prod-* で揃える。compose.dev.yaml は
# mado-dev-* なので、両者は完全に独立した名前空間で走る (network/volume も自動で
# project name prefix される)。dev → prod のうっかり乗り換えで残留コンテナと
# 衝突する事故を防ぐため。
#
# volume は明示名を付けず Docker の `${project}_${name}` 自動命名に任せる
# (= mado-prod_db_data)。dev も mado-dev_db_data なので並ぶ。
name: mado-prod
services:
  postgres:
    image: postgres:16-alpine
    container_name: mado-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # 本番は弱い既定値を埋め込まず、.env からの注入を必須にする (未設定なら起動失敗)。
      # 注意: いずれも DB ボリュームの初回 init 時のみ反映。既存DBは ALTER ROLE で変更する。
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?.env に POSTGRES_PASSWORD を設定してください}"
      POSTGRES_DB: dashboard
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD:?.env に DASHBOARD_PASSWORD を設定してください (DATABASE_URL のパスワードと一致させること)}"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-internal:
    build: ./api
    container_name: mado-prod-api-internal
    command: ["sh", "-c", "npm run build && node dist/internal.js"]
    env_file:
      - .env
    environment:
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: mado-prod-nginx
    # nginx は非 root user (uid 101) で動くため container 内では :8080 を listen する。
    # host 側のみ 80 を晒す。
    ports:
      - "80:8080"
    depends_on:
      - api-internal
    restart: unless-stopped

volumes:
  db_data:
