# compose.prod.yaml
# project name と container_name を mado-prod-* で揃える。compose.dev.yaml は
# mado-dev-* なので、両者は完全に独立した名前空間で走る (network/volume も自動で
# project name prefix される)。dev → prod のうっかり乗り換えで残留コンテナと
# 衝突する事故を防ぐため。
#
# 注意: db_data_prod 自体の `name:` は web-dashboard_db_data_prod のまま据え置く。
# project name 変更で「volume が作り直される (= 既存データ消失)」を避けるため、
# 明示名で固定して以前から運用しているデータをそのまま参照させる。
name: mado-prod
services:
  postgres:
    image: postgres:16-alpine
    container_name: mado-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dashboard
      DASHBOARD_PASSWORD: CHANGEME
    volumes:
      - db_data_prod:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-internal:
    build: ./api
    container_name: mado-prod-api-internal
    command: ["sh", "-c", "npm run build && node dist/internal.js"]
    env_file:
      - .env
    environment:
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api-external:
    build: ./api
    container_name: mado-prod-api-external
    command: ["sh", "-c", "npm run build && node dist/external.js"]
    env_file:
      - .env
    environment:
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: mado-prod-nginx
    # nginx は非 root user (uid 101) で動くため container 内では :8080 を listen する。
    # host 側のみ 80 を晒す。
    ports:
      - "80:8080"
    depends_on:
      - api-internal
      - api-external
    restart: unless-stopped

volumes:
  db_data_prod:
    name: web-dashboard_db_data_prod
