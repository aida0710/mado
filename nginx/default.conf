# nginx/default.conf
#
# 本ダッシュボードは LAN / VPN 内利用前提 (詳細は README の "セキュリティモデル")。
# Internet からの inbound は network 層 (mdx ACL / firewall) で遮断される前提なので
# nginx config レベルでは IP 制限を入れていない。
server {
    listen 8080;
    server_name _;

    # nginx version を Server ヘッダ / エラーページで露出させない
    server_tokens off;

    # セキュリティヘッダ (LAN 内ツール、HTTPS なしのため HSTS は付けない)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # SPA: client-side ルーティング有効。
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ブラウザ向け internal API。
    location /api/internal/ {
        proxy_pass http://api-internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
