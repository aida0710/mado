# nginx/default.conf
#
# 本ダッシュボードは LAN / VPN 内利用前提 (詳細は README の "セキュリティモデル")。
# Internet からの inbound は network 層 (mdx ACL / firewall) で遮断される前提なので
# nginx config レベルでは IP 制限を入れていない。
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # nginx version を Server ヘッダ / エラーページで露出させない
    server_tokens off;

    # セキュリティヘッダ (LAN 内ツール、HTTPS なしのため HSTS は付けない)。
    # nginx の `add_header` は child location が独自の `add_header` を 1 つでも
    # 宣言すると親側のヘッダが継承されないため、各 location でも再宣言が必要。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # ── Vite ビルドのハッシュ付き静的アセット (/assets/index-XXXX.js 等) ─────
    # ハッシュは内容の指紋。中身が変われば URL も変わるので「同じ URL = 同じ中身」
    # が永久に成り立つ。`immutable` でブラウザに「以後 revalidate も不要」と伝える。
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        try_files $uri =404;
    }

    # ── index.html: 古い HTML が新しい chunk ハッシュに追いつかないと
    #    「Failed to fetch dynamically imported module」(stale HTML 問題) が出る。
    #    `no-cache` で毎リクエスト再検証する (ETag/Last-Modified ベースで 304 が
    #    返るので軽量)。デプロイ直後でも次のページロードで新 HTML を取れる。
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # SPA: client-side ルーティング有効。/storage/... など実ファイルが無い path も
    # index.html にフォールバックして React Router が引き継ぐ。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ブラウザ向け internal API。
    location /api/internal/ {
        proxy_pass http://api-internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
