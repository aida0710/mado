# nginx/default.conf
#
# 2 つのサーバを listen する:
#   - 8080: UI / internal API / external API すべて (LAN 内クライアント向け)。
#           host 側 :80 に publish。/ と /api/internal/ は LAN (10.15.0.0/16)
#           制限あり、/api/external/ は IP 制限なし (Bearer WRITE_TOKEN で防御)。
#   - 8081: /api/external/ 専用 (LAN 外の HPC ノードからの metrics ingest 用)。
#           host 側 :81 に publish。port 80 が LAN 限定で firewall されている
#           ネットワーク向けの逃げ道。Bearer WRITE_TOKEN で防御する前提。
#
# どちらの server も同じ api-external コンテナにプロキシする。
server {
    listen 8080;
    server_name _;

    # nginx version を Server ヘッダ / エラーページで露出させない
    server_tokens off;

    # セキュリティヘッダ (LAN 内ツール、HTTPS なしのため HSTS は付けない)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # 静的: SPA fallback で client-side ルーティング有効。
    # ブラウザ向け UI のため LAN (10.15.0.0/16) 内に限定。
    location / {
        allow 10.15.0.0/16;
        deny all;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ブラウザ向け internal API。LAN (10.15.0.0/16) 内に限定。
    # docker bridge ネットワーク経由で nginx は実 client IP を見られることを
    # 検証済 (mado-prod-nginx のログで 10.15.22.147 が記録されることを確認)。
    location /api/internal/ {
        allow 10.15.0.0/16;
        deny all;
        proxy_pass http://api-internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # LAN 内からの metrics ingest。8081 と同じく Bearer WRITE_TOKEN で防御。
    # IP 制限なし (8081 と挙動を揃える / 内部から外へ抜ける NAT 経由でも届くように)。
    location /api/external/ {
        proxy_pass http://api-external:3001;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 2m;
    }
}

# LAN 外 (HPC ノード等) からの metrics ingest 専用。
# /api/external/ 以外は 404 (UI / internal API はここから絶対に晒さない)。
server {
    listen 8081;
    server_name _;
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location /api/external/ {
        proxy_pass http://api-external:3001;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 2m;
    }

    location / {
        return 404;
    }
}
