# nginx/default.conf
server {
    listen 8080;
    server_name _;

    # nginx version を Server ヘッダ / エラーページで露出させない
    server_tokens off;

    # セキュリティヘッダ (LAN 内ツール、HTTPS なしのため HSTS は付けない)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # 静的: SPA fallback で client-side ルーティング有効。
    # ブラウザ向け UI のため LAN (10.15.0.0/16) 内に限定。
    location / {
        allow 10.15.0.0/16;
        deny all;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ブラウザ向け internal API。LAN (10.15.0.0/16) 内に限定。
    # docker bridge ネットワーク経由で nginx は実 client IP を見られることを
    # 検証済 (mado-nginx-prod のログで 10.15.22.147 が記録されることを確認)。
    location /api/internal/ {
        allow 10.15.0.0/16;
        deny all;
        proxy_pass http://api-internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # 外部 cron ingest。HPC ノードがどのネットワークから来ても良いように
    # IP 制限なし (Bearer WRITE_TOKEN で防御)。
    location /api/external/ {
        proxy_pass http://api-external:3001;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 2m;
    }
}
