# compose.dev.yaml
# project name と container_name を mado-dev-* で揃える。compose.prod.yaml は
# mado-prod-* なので、両者は完全に独立した名前空間で走る (network/volume も自動で
# project name prefix される)。dev → prod のうっかり乗り換えで残留コンテナと
# 衝突する事故を防ぐため。
name: mado-dev
services:
  postgres:
    image: postgres:16-alpine
    container_name: mado-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # dev はゼロ設定で動くよう既定値あり。.env で上書き可能。
      # 注意: いずれも DB ボリュームの初回 init 時のみ反映 (既存DBは ALTER ROLE)。
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: dashboard
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD:-CHANGEME}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-internal:
    build: ./api
    container_name: mado-dev-api-internal
    command: ["npx", "tsx", "watch", "internal.ts"]
    env_file:
      - .env
    environment:
      PORT: 3000
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  front:
    build: ./front
    container_name: mado-dev-front
    # About のコミット表示。通常は下の .git マウント + コンテナ内 git で解決される。
    # env が設定されていれば (例: ./dev.sh) そちらを優先 (vite.config が env→git→'dev')。
    environment:
      VITE_GIT_COMMIT: "${VITE_GIT_COMMIT:-}"
      VITE_GIT_DATE: "${VITE_GIT_DATE:-}"
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
      # vite.config がコミット情報を読むため host の .git を read-only で渡す。
      - ./.git:/app/.git:ro
    depends_on:
      - api-internal

volumes:
  db_data:
